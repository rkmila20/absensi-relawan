<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Absensi Relawan SPPG</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>ABSENSI RELAWAN</h1>

        <h2>SPPG AL-GHOZALI PAKISKEMBAR 2</h2>

        <div class="form-group">

            <label>Divisi</label>

            <select id="divisi">
                <option>Memuat...</option>
            </select>

        </div>

        <div class="form-group">

            <label>Nama Relawan</label>

            <select id="relawan">

                <option>Pilih Divisi dahulu</option>

            </select>

        </div>

        <div class="form-group">

            <label>Jenis Absen</label>

            <select id="jenis">

                <option value="Masuk">Masuk</option>
                <option value="Pulang">Pulang</option>

            </select>

        </div>

        <button id="btnLanjut">

            LANJUT SELFIE →

        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>

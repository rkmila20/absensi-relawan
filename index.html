<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Absensi Relawan SPPG</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <img src="logo.png" class="logo" alt="Logo SPPG">

        <h1>ABSENSI RELAWAN</h1>

        <h2>SPPG AL-GHOZALI PAKISKEMBAR 2</h2>

        <div id="tanggal"></div>

        <div id="jam"></div>

    </div>


    <!-- CARD -->

    <div class="card">

        <!-- DIVISI -->

        <label>
            🏢 Divisi
        </label>

        <select id="divisi">
            <option value="">Pilih Divisi</option>
        </select>


        <!-- RELAWAN -->

        <label>
            👤 Nama Relawan
        </label>

        <select id="relawan">
            <option value="">Pilih Nama Relawan</option>
        </select>


        <!-- JENIS ABSEN -->

       <label>📋 Jenis Absen</label>

<div class="jenis-container">

    <button type="button" id="btnDatang" class="btnJenis datang">
        ↘️ DATANG
    </button>

    <button type="button" id="btnPulang" class="btnJenis pulang">
        ↗️ PULANG
    </button>

</div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
